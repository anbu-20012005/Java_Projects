<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 12px;
        }
        
        .section {
            margin-bottom: 15px;
        }
        
        .section-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        
        .input-group {
            margin-bottom: 10px;
        }
        
        label {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
            color: #555;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }
        
        textarea {
            height: 60px;
            resize: vertical;
        }
        
        button {
            width: 100%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #e9ecef;
            min-height: 40px;
            margin-top: 10px;
        }
        
        .result-text {
            margin-bottom: 8px;
        }
        
        .copy-btn {
            background: #28a745;
            font-size: 11px;
            padding: 4px 8px;
            width: auto;
        }
        
        .copy-btn:hover {
            background: #1e7e34;
        }
        
        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .instructions {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #0c5460;
            margin-top: 10px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🌐 Translator</div>
        <div class="subtitle">Translate text on any webpage</div>
    </div>
    
    <div class="section">
        <div class="section-title">Quick Translate</div>
        <div class="input-group">
            <label for="quickText">Text to translate:</label>
            <textarea id="quickText" placeholder="Enter text here..."></textarea>
        </div>
        
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <div style="flex: 1;">
                <label for="fromLang">From:</label>
                <select id="fromLang">
                    <option value="English">English</option>
                    <option value="Tamil">Tamil</option>
                    <option value="Hindi">Hindi</option>
                    <option value="French">French</option>
                    <option value="Spanish">Spanish</option>
                    <option value="German">German</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Malayalam">Malayalam</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="toLang">To:</label>
                <select id="toLang">
                    <option value="Tamil">Tamil</option>
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="French">French</option>
                    <option value="Spanish">Spanish</option>
                    <option value="German">German</option>
                    <option value="Chinese">Chinese</option>
                    <option value="Japanese">Japanese</option>
                    <option value="Korean">Korean</option>
                    <option value="Malayalam">Malayalam</option>
                </select>
            </div>
        </div>
        
        <button id="translateBtn">Translate</button>
        
        <div id="result" class="result" style="display: none;">
            <div id="resultText" class="result-text"></div>
            <button id="copyBtn" class="copy-btn">Copy Result</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <div class="instructions">
        <strong>How to use:</strong><br>
        • Select text on any webpage and use Ctrl+T to translate<br>
        • Or use this popup for quick translations<br>
        • Make sure the FastAPI service is running
    </div>

    <script src="popup.js"></script>
</body>
</html>
